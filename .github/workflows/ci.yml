name: CI - Run Tests

'on':
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install fastapi uvicorn shap numpy pandas scikit-learn python-dotenv pydantic pytest httpx
    
    - name: Run tests
      run: |
        pytest tests/test_api.py -v